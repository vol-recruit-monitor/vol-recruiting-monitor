name: Vol Recruiting Monitor – Scrape & Deploy

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Run Recruiting Scraper
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python scraper.py || echo "Scraper exited with error — continuing to deploy"

      - name: Verify offers.json exists
        run: |
          if [ ! -f data/offers.json ]; then
            echo '{"players":[],"last_updated":"never","sources":{"x":0,"on3":0,"sports247":0}}' > data/offers.json
            echo "Created empty offers.json fallback"
          else
            echo "offers.json found:"
            cat data/offers.json | python3 -m json.tool --no-ensure-ascii | head -30
          fi

      - name: Commit updated data
        run: |
          git config user.name "Vol Recruiting Bot"
          git config user.email "bot@vols.utk.edu"
          git add data/offers.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update offers — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main || echo "Push failed — skipping"

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,scraper.py,requirements.txt,.gitignore,README.md,SETUP_GUIDE.md'
          force_orphan: false
          keep_files: false
          commit_message: "Deploy site — $(date -u '+%Y-%m-%d %H:%M UTC')"
