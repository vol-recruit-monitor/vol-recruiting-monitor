Vol Recruiting Monitor – Scraper v3
=====================================
Priority: X/Twitter → On3 → 247Sports
- NEVER invents data. Every player must come from a real source.
- ALWAYS writes data/offers.json even on partial or total failure.
- Tracks source URL per player so dashboard can cite where each was found.
- Merges with existing data across runs (offers accumulate).
"""

