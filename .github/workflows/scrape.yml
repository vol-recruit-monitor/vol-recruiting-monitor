name: Vol Recruiting Monitor – Scrape & Deploy

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # ── Force Node 24 everywhere (kills Node 20 deprecation warning) ──────────
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies directly (no requirements.txt needed) ────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ── 4. Ensure data folder exists ─────────────────────────────────────────
      - name: Ensure data folder exists
        run: |
          mkdir -p data
          echo "data/ folder ready"

      # ── 5. Run Scraper ────────────────────────────────────────────────────────
      - name: Run Recruiting Scraper
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          echo "=== Starting scraper ==="
          python scraper.py
          echo "=== Scraper finished ==="
        continue-on-error: true

      # ── 6. Guarantee offers.json exists (never deploy a broken site) ─────────
      - name: Verify / create offers.json
        run: |
          if [ ! -f data/offers.json ]; then
            echo "⚠️  offers.json missing — creating empty fallback"
            echo '{"players":[],"last_updated":"never","sources":{"x":0,"news":0,"on3":0,"247sports":0},"total":0}' > data/offers.json
          else
            echo "✅ offers.json found — contents:"
            python3 -c "
          import json
          with open('data/offers.json') as f:
              d = json.load(f)
          print(f'  Total players: {d.get(\"total\", len(d.get(\"players\", [])))}')
          print(f'  Last updated:  {d.get(\"last_updated\",\"unknown\")}')
          print(f'  Sources:       {d.get(\"sources\",{})}')
          for p in d.get('players',[])[:5]:
              print(f'  - {p.get(\"name\")} | {p.get(\"position\")} | {p.get(\"state\")} | {p.get(\"source\")}')
          "
          fi

      # ── 7. Commit updated data back to main ──────────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name  "Vol Recruiting Bot"
          git config user.email "bot@vols.utk.edu"
          git add data/offers.json
          git diff --staged --quiet \
            && echo "No new data to commit" \
            || git commit -m "Update offers — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main || echo "Push skipped (nothing to push)"

      # ── 8. Deploy to gh-pages branch ─────────────────────────────────────────
      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token:   ${{ secrets.GITHUB_TOKEN }}
          publish_dir:    ./
          publish_branch: gh-pages
          exclude_assets: '.github,scraper.py,requirements.txt,.gitignore,README.md,SETUP_GUIDE.md'
          force_orphan:   false
          keep_files:     false
          commit_message: "Deploy site — $(date -u '+%Y-%m-%d %H:%M UTC')"
