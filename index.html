<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vol Recruiting Monitor | Tennessee Footprint</title>
<style>
  :root {
    --vol-orange: #FF8200;
    --vol-white: #FFFFFF;
    --dark-bg: #4B4B4B;
    --card-bg: #252729;
    --card-border: #FF8200;
    --sec-color: #FF8200;
    --p4-color: #4cc9f0;
    --g6-color: #7209b7;
    --gem-color: #06d6a0;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0a0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--dark-bg); color:var(--text-primary); min-height:100vh; }

  /* ── PASSWORD GATE ── */
  .gate {
    position:fixed; inset:0;
    background:linear-gradient(135deg,#0f0f1a,#1a1a2e,#0f0f1a);
    display:flex; justify-content:center; align-items:center;
    z-index:99999; transition:opacity .5s,visibility .5s;
  }
  .gate.hidden { opacity:0; visibility:hidden; pointer-events:none; }
  .gate-box {
    background:var(--card-bg); border:1px solid var(--card-border);
    border-radius:16px; padding:3rem 2.5rem; text-align:center;
    max-width:420px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,.5);
    animation:fadeUp .6s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .gate-t { font-size:4rem; font-weight:900; color:var(--vol-orange); line-height:1; margin-bottom:.5rem; }
  .gate-title { font-size:1.1rem; color:#fff; font-weight:700; margin-bottom:.3rem; }
  .gate-sub { font-size:.8rem; color:var(--text-secondary); margin-bottom:2rem; }
  .gate-wrap { position:relative; margin-bottom:1rem; }
  .gate-input {
    width:100%; padding:.85rem 3rem .85rem 1.2rem;
    background:rgba(255,255,255,.05); border:2px solid var(--card-border);
    border-radius:10px; color:#fff; font-size:1rem; outline:none; transition:border-color .2s;
  }
  .gate-input:focus { border-color:var(--vol-orange); }
  .gate-toggle {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:1.1rem;
  }
  .gate-toggle:hover { color:var(--vol-orange); }
  .gate-btn {
    width:100%; padding:.85rem; background:var(--vol-orange); color:#fff;
    border:none; border-radius:10px; font-size:1rem; font-weight:700;
    cursor:pointer; transition:background .2s,transform .1s;
  }
  .gate-btn:hover { background:#e67400; }
  .gate-btn:active { transform:scale(.98); }
  .gate-err { color:#ff6b6b; font-size:.8rem; margin-top:.75rem; min-height:1.2rem; font-weight:600; }
  .gate-err.shake { animation:shake .5s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
  }

  /* ── DASHBOARD ── */
  .dash { display:none; }
  .dash.unlocked { display:block; }

  /* ── HEADER ── */
  .header {
    background:linear-gradient(135deg,#0f0f1a,#1a1a2e,#0f0f1a);
    border-bottom:3px solid var(--vol-orange);
    padding:1.25rem 2rem;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;
  }
  .header-left { display:flex; align-items:center; gap:1rem; }
  .power-t { font-size:2.5rem; font-weight:900; color:var(--vol-orange); }
  .header-title h1 { font-size:1.4rem; color:#fff; font-weight:700; }
  .header-title p { font-size:.8rem; color:var(--text-secondary); }
  .last-updated {
    background:rgba(255,130,0,.1); border:1px solid rgba(255,130,0,.3);
    padding:.5rem 1rem; border-radius:8px; font-size:.8rem; color:var(--vol-orange);
  }
  .live-dot {
    display:inline-block; width:8px; height:8px;
    background:#06d6a0; border-radius:50%; margin-right:6px;
    animation:pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── FILTERS ── */
  .filters {
    background:rgba(15,52,96,.4); padding:1rem 2rem;
    display:flex; gap:.75rem; align-items:center; flex-wrap:wrap;
    border-bottom:1px solid rgba(255,130,0,.15);
  }
  .filter-group { display:flex; align-items:center; gap:.5rem; }
  .filter-group label { font-size:.75rem; color:var(--text-secondary); font-weight:600; text-transform:uppercase; white-space:nowrap; }
  select, input[type="text"] {
    background:var(--card-bg); color:var(--text-primary);
    border:1px solid var(--card-border); padding:.45rem .9rem;
    border-radius:6px; font-size:.82rem; outline:none; transition:border-color .2s;
  }
  select:focus, input[type="text"]:focus { border-color:var(--vol-orange); }
  input[type="text"] { width:190px; }
  .filter-actions { margin-left:auto; display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
  .stat-pill {
    padding:.3rem .7rem; border-radius:20px; font-size:.72rem; font-weight:700;
  }
  .pill-sec { background:rgba(255,130,0,.15); color:var(--sec-color); border:1px solid rgba(255,130,0,.3); }
  .pill-p4  { background:rgba(76,201,240,.15); color:var(--p4-color);  border:1px solid rgba(76,201,240,.3); }
  .pill-g6  { background:rgba(114,9,183,.15);  color:var(--g6-color);  border:1px solid rgba(114,9,183,.3); }
  .pill-gem { background:rgba(6,214,160,.15);  color:var(--gem-color); border:1px solid rgba(6,214,160,.3); }
  .export-btn {
    padding:.4rem .9rem; background:rgba(255,130,0,.15); color:var(--vol-orange);
    border:1px solid rgba(255,130,0,.4); border-radius:6px; font-size:.78rem;
    font-weight:700; cursor:pointer; transition:background .2s;
  }
  .export-btn:hover { background:rgba(255,130,0,.3); }

  /* ── TABS ── */
  .tabs {
    display:flex; padding:0 2rem;
    background:rgba(15,52,96,.2);
    border-bottom:1px solid rgba(255,130,0,.1);
    overflow-x:auto;
  }
  .tab {
    padding:.85rem 1.5rem; font-size:.85rem; font-weight:600;
    color:var(--text-secondary); cursor:pointer;
    border-bottom:3px solid transparent;
    border-top:none; border-left:none; border-right:none;
    background:none; transition:all .2s; white-space:nowrap;
  }
  .tab:hover { color:var(--text-primary); }
  .tab.t-all  { } .tab.t-all.active  { color:var(--vol-orange); border-bottom-color:var(--vol-orange); }
  .tab.t-sec  { } .tab.t-sec.active  { color:var(--sec-color);  border-bottom-color:var(--sec-color); }
  .tab.t-p4   { } .tab.t-p4.active   { color:var(--p4-color);   border-bottom-color:var(--p4-color); }
  .tab.t-g6   { } .tab.t-g6.active   { color:var(--g6-color);   border-bottom-color:var(--g6-color); }
  .tab.t-gem  { } .tab.t-gem.active  { color:var(--gem-color);  border-bottom-color:var(--gem-color); }
  .tab-count {
    margin-left:6px; padding:1px 7px; border-radius:10px;
    font-size:.7rem; background:rgba(255,255,255,.08);
  }

  /* ── GRID ── */
  .content { padding:1.5rem 2rem; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:1.25rem; }

  /* ── PLAYER CARD ── */
  .card {
    background:var(--card-bg); border:1px solid var(--card-border);
    border-radius:12px; padding:1.25rem; position:relative;
    transition:transform .2s,box-shadow .2s;
  }
  .card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.4); }
  .card.cat-sec  { border-left:4px solid var(--sec-color); }
  .card.cat-p4   { border-left:4px solid var(--p4-color);  }
  .card.cat-g6   { border-left:4px solid var(--g6-color);  }
  .card.cat-gem  { border-left:4px solid var(--gem-color); }

  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.75rem; }
  .player-name { font-size:1.1rem; font-weight:700; color:#fff; }
  .player-meta { font-size:.78rem; color:var(--text-secondary); margin-top:2px; }

  .gem-badge {
    background:rgba(6,214,160,.15); color:var(--gem-color);
    border:1px solid rgba(6,214,160,.4);
    padding:.2rem .6rem; border-radius:20px; font-size:.7rem; font-weight:700;
  }

  .measurables {
    display:flex; gap:.5rem; margin-bottom:.75rem; flex-wrap:wrap;
  }
  .meas-chip {
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
    padding:.2rem .6rem; border-radius:6px; font-size:.75rem; color:var(--text-secondary);
  }
  .meas-chip span { color:var(--text-primary); font-weight:600; }

  /* Offers */
  .offers-section { margin-bottom:.75rem; }
  .offers-label { font-size:.7rem; text-transform:uppercase; color:var(--text-secondary); margin-bottom:.4rem; font-weight:600; }
  .offers-list { display:flex; flex-wrap:wrap; gap:.35rem; }
  .offer-tag {
    padding:.15rem .55rem; border-radius:4px; font-size:.72rem; font-weight:600;
  }
  .offer-sec { background:rgba(255,130,0,.15); color:var(--sec-color); border:1px solid rgba(255,130,0,.3); }
  .offer-p4  { background:rgba(76,201,240,.12); color:var(--p4-color);  border:1px solid rgba(76,201,240,.25); }
  .offer-g6  { background:rgba(114,9,183,.12);  color:#b48adc;          border:1px solid rgba(114,9,183,.25); }
  .offer-unk { background:rgba(255,255,255,.05); color:var(--text-secondary); border:1px solid rgba(255,255,255,.1); }

  /* AI Eval */
  .eval-section { margin-bottom:.85rem; }
  .eval-row { margin-bottom:.35rem; }
  .eval-label { font-size:.68rem; text-transform:uppercase; font-weight:700; margin-bottom:.15rem; }
  .eval-label.str { color:#06d6a0; }
  .eval-label.wk  { color:#ff6b6b; }
  .eval-text { font-size:.75rem; color:var(--text-secondary); line-height:1.4; }

  /* Source cite */
  .source-cite {
    font-size:.68rem; color:var(--text-secondary); margin-bottom:.75rem;
    padding:.3rem .6rem; background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.07); border-radius:6px;
  }
  .source-cite a { color:var(--vol-orange); text-decoration:none; }
  .source-cite a:hover { text-decoration:underline; }

  /* Links */
  .card-links { display:flex; gap:.5rem; flex-wrap:wrap; }
  .clink {
    padding:.3rem .75rem; border-radius:6px; font-size:.73rem; font-weight:600;
    text-decoration:none; transition:opacity .2s; display:inline-flex; align-items:center; gap:.3rem;
  }
  .clink:hover { opacity:.8; }
  .lnk-x    { background:rgba(255,255,255,.08); color:#e0e0e0; border:1px solid rgba(255,255,255,.15); }
  .lnk-hudl { background:rgba(255,110,21,.12);  color:#ff6e15; border:1px solid rgba(255,110,21,.3); }
  .lnk-uc   { background:rgba(76,201,240,.1);   color:var(--p4-color); border:1px solid rgba(76,201,240,.25); }

  /* Gem score bar */
  .gem-bar-wrap { margin-bottom:.75rem; }
  .gem-bar-label { display:flex; justify-content:space-between; font-size:.7rem; color:var(--text-secondary); margin-bottom:.3rem; }
  .gem-bar-track { background:rgba(255,255,255,.07); border-radius:4px; height:5px; overflow:hidden; }
  .gem-bar-fill  { height:100%; border-radius:4px; transition:width .6s ease; }

  /* Empty / loading states */
  .empty-state {
    text-align:center; padding:5rem 2rem; color:var(--text-secondary);
  }
  .empty-icon { font-size:3rem; margin-bottom:1rem; }
  .empty-title { font-size:1.2rem; font-weight:700; color:var(--text-primary); margin-bottom:.5rem; }
  .empty-sub { font-size:.85rem; line-height:1.6; }

  /* Sources status bar */
  .sources-bar {
    background:rgba(15,52,96,.3); padding:.5rem 2rem;
    display:flex; gap:1.5rem; align-items:center; flex-wrap:wrap;
    border-bottom:1px solid rgba(255,255,255,.05); font-size:.75rem;
  }
  .src-item { display:flex; align-items:center; gap:.4rem; }
  .src-dot { width:7px; height:7px; border-radius:50%; }
  .src-ok  { background:#06d6a0; }
  .src-err { background:#ff6b6b; }
  .src-na  { background:var(--text-secondary); }

  /* Responsive */
  @media(max-width:640px) {
    .filters { padding:.75rem 1rem; }
    .content { padding:1rem; }
    .header  { padding:1rem; }
    .tabs    { padding:0 .5rem; }
    input[type="text"] { width:150px; }
  }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-t">T</div>
    <div class="gate-title">Vol Recruiting Monitor</div>
    <div class="gate-sub">Tennessee Football | Restricted Access</div>
    <div class="gate-wrap">
      <input class="gate-input" id="pwInput" type="password" placeholder="Enter password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="gate-toggle" id="pwToggle" type="button" onclick="togglePw()">👁</button>
    </div>
    <button class="gate-btn" onclick="checkPw()">Enter Dashboard</button>
    <div class="gate-err" id="pwErr"></div>
    <div style="font-size:.68rem;color:var(--text-secondary);margin-top:.5rem;">Case sensitive</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="power-t">T</div>
      <div class="header-title">
        <h1>Vol Recruiting Monitor</h1>
        <p>Tennessee Footprint · 15-State Coverage · Auto-updated every 20 minutes</p>
      </div>
    </div>
    <div class="last-updated" id="lastUpdated">
      <span class="live-dot"></span>Loading…
    </div>
  </div>

  <!-- Sources status -->
  <div class="sources-bar" id="sourcesBar"></div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>Grad Year</label>
      <select id="filterYear" onchange="applyFilters()">
        <option value="">All Years</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
        <option value="2029">2029</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Position</label>
      <select id="filterPos" onchange="applyFilters()">
        <option value="">All Positions</option>
        <option value="QB">QB</option>
        <option value="RB">RB</option>
        <option value="WR">WR</option>
        <option value="TE">TE</option>
        <option value="OL">OL / OT / OG</option>
        <option value="DL">DL / DT / DE</option>
        <option value="EDGE">EDGE</option>
        <option value="LB">LB / ILB / OLB</option>
        <option value="CB">CB</option>
        <option value="S">S / DB / FS / SS</option>
        <option value="ATH">ATH</option>
        <option value="K">K / P</option>
      </select>
    </div>
    <div class="filter-group">
      <label>State</label>
      <select id="filterState" onchange="applyFilters()">
        <option value="">All States</option>
        <option value="TN">TN</option><option value="KY">KY</option>
        <option value="VA">VA</option><option value="NC">NC</option>
        <option value="GA">GA</option><option value="AL">AL</option>
        <option value="MS">MS</option><option value="AR">AR</option>
        <option value="MO">MO</option><option value="SC">SC</option>
        <option value="FL">FL</option><option value="OH">OH</option>
        <option value="IN">IN</option><option value="WV">WV</option>
        <option value="LA">LA</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Search</label>
      <input type="text" id="filterSearch" placeholder="Name or school…" oninput="applyFilters()">
    </div>
    <div class="filter-actions">
      <span class="stat-pill pill-sec" id="pillSec">SEC: 0</span>
      <span class="stat-pill pill-p4"  id="pillP4">P4: 0</span>
      <span class="stat-pill pill-g6"  id="pillG6">G6: 0</span>
      <span class="stat-pill pill-gem" id="pillGem">💎 0</span>
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab t-all active" data-tab="all"  onclick="switchTab('all')">All Footprint<span class="tab-count" id="cnt-all">0</span></button>
    <button class="tab t-sec"        data-tab="sec"  onclick="switchTab('sec')">🟠 SEC Offers<span class="tab-count" id="cnt-sec">0</span></button>
    <button class="tab t-p4"         data-tab="p4"   onclick="switchTab('p4')">🔵 Other P4<span class="tab-count" id="cnt-p4">0</span></button>
    <button class="tab t-g6"         data-tab="g6"   onclick="switchTab('g6')">🟣 G6 Footprint<span class="tab-count" id="cnt-g6">0</span></button>
    <button class="tab t-gem"        data-tab="gem"  onclick="switchTab('gem')">💎 Hidden Gems<span class="tab-count" id="cnt-gem">0</span></button>
  </div>

  <!-- Grid -->
  <div class="content">
    <div class="grid" id="grid"></div>
  </div>

</div><!-- /dash -->

<script>
// ── Password ──────────────────────────────────────────────────────────────────
const CORRECT_PASSWORD = "BelieveTheHeup26@UT";

function togglePw() {
  const inp = document.getElementById('pwInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function checkPw() {
  const val = document.getElementById('pwInput').value;
  const err = document.getElementById('pwErr');
  if (val === CORRECT_PASSWORD) {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('dash').classList.add('unlocked');
    loadData();
  } else {
    err.textContent = 'Incorrect password. Case sensitive.';
    err.classList.remove('shake');
    void err.offsetWidth;
    err.classList.add('shake');
    document.getElementById('pwInput').value = '';
  }
}

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPw();
});

// ── Data & State ──────────────────────────────────────────────────────────────
let ALL_PLAYERS    = [];
let ACTIVE_TAB     = 'all';
let FILTER_YEAR    = '';
let FILTER_POS     = '';
let FILTER_STATE   = '';
let FILTER_SEARCH  = '';

const SEC_SCHOOLS = new Set([
  "Tennessee","Alabama","Auburn","Florida","Georgia","Kentucky",
  "LSU","Mississippi State","Missouri","Ole Miss","South Carolina",
  "Vanderbilt","Arkansas","Texas","Texas A&M","Oklahoma"
]);
const P4_SCHOOLS = new Set([
  ...SEC_SCHOOLS,
  "Ohio State","Michigan","Penn State","Oregon","USC","Wisconsin","Iowa",
  "Minnesota","Illinois","Indiana","Purdue","Nebraska","Northwestern",
  "Maryland","Rutgers","Michigan State","UCLA","Washington",
  "Clemson","Florida State","Miami","NC State","Duke","Wake Forest",
  "Louisville","Virginia Tech","Virginia","Boston College","Pitt",
  "Syracuse","Georgia Tech","North Carolina","Notre Dame","SMU","Stanford","Cal",
  "Oklahoma State","Texas Tech","TCU","Baylor","Kansas","Kansas State",
  "Iowa State","West Virginia","Cincinnati","UCF","Houston","BYU",
  "Colorado","Arizona","Arizona State","Utah"
]);

function offerClass(school) {
  if (SEC_SCHOOLS.has(school)) return 'offer-sec';
  if (P4_SCHOOLS.has(school))  return 'offer-p4';
  return 'offer-g6';
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch(`data/offers.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    ALL_PLAYERS = (json.players || []);
    const ts    = json.last_updated
      ? new Date(json.last_updated).toLocaleString('en-US',{timeZoneName:'short'})
      : 'Unknown';
    document.getElementById('lastUpdated').innerHTML =
      `<span class="live-dot"></span>Updated: ${ts}`;

    renderSourcesBar(json.sources_checked || []);
    applyFilters();
  } catch(e) {
    document.getElementById('lastUpdated').innerHTML =
      `<span style="color:#ff6b6b">⚠ Data unavailable — ${e.message}</span>`;
    showEmpty('waiting');
  }
}

function renderSourcesBar(sources) {
  if (!sources.length) return;
  const bar = document.getElementById('sourcesBar');
  const label = `<span style="font-size:.72rem;color:var(--text-secondary);font-weight:600">SOURCES:</span>`;
  const items = sources.map(s => `
    <span class="src-item">
      <span class="src-dot ${s.status==='ok'?'src-ok':s.status==='error'?'src-err':'src-na'}"></span>
      <span>${s.name} — ${s.count} found</span>
    </span>`).join('');
  bar.innerHTML = label + items;
}

// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters() {
  FILTER_YEAR   = document.getElementById('filterYear').value;
  FILTER_POS    = document.getElementById('filterPos').value;
  FILTER_STATE  = document.getElementById('filterState').value;
  FILTER_SEARCH = document.getElementById('filterSearch').value.trim().toLowerCase();
  renderGrid();
}

function switchTab(tab) {
  ACTIVE_TAB = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  renderGrid();
}

function posMatch(playerPos, filterPos) {
  if (!filterPos) return true;
  const p = (playerPos || '').toUpperCase();
  const f = filterPos.toUpperCase();
  if (f === 'OL')   return ['OL','OT','OG','C'].some(x => p.includes(x));
  if (f === 'DL')   return ['DL','DT','DE'].some(x => p.includes(x));
  if (f === 'LB')   return ['LB','ILB','OLB'].some(x => p.includes(x));
  if (f === 'S')    return ['S','DB','FS','SS'].some(x => p === x || p.startsWith(x));
  if (f === 'K')    return ['K','P','K/P'].some(x => p.includes(x));
  return p.startsWith(f) || p === f;
}

function filterPlayers(players) {
  return players.filter(p => {
    if (FILTER_YEAR   && p.grad_year   !== FILTER_YEAR) return false;
    if (FILTER_STATE  && p.state       !== FILTER_STATE) return false;
    if (FILTER_POS    && !posMatch(p.position, FILTER_POS)) return false;
    if (FILTER_SEARCH) {
      const hay = `${p.name} ${(p.offers||[]).join(' ')} ${p.state} ${p.position}`.toLowerCase();
      if (!hay.includes(FILTER_SEARCH)) return false;
    }
    return true;
  });
}

function tabFilter(players, tab) {
  switch(tab) {
    case 'sec': return players.filter(p => p.category === 'sec');
    case 'p4':  return players.filter(p => p.category === 'p4');
    case 'g6':  return players.filter(p => p.category === 'g6' && !p.is_hidden_gem);
    case 'gem': return players.filter(p => p.is_hidden_gem);
    default:    return players;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderGrid() {
  const filtered = filterPlayers(ALL_PLAYERS);

  // Update tab counts
  ['all','sec','p4','g6','gem'].forEach(t => {
    document.getElementById(`cnt-${t}`).textContent = tabFilter(filtered, t).length;
  });

  // Update pills
  document.getElementById('pillSec').textContent = `SEC: ${filtered.filter(p=>p.category==='sec').length}`;
  document.getElementById('pillP4').textContent  = `P4: ${filtered.filter(p=>p.category==='p4').length}`;
  document.getElementById('pillG6').textContent  = `G6: ${filtered.filter(p=>p.category==='g6').length}`;
  document.getElementById('pillGem').textContent = `💎 ${filtered.filter(p=>p.is_hidden_gem).length}`;

  const toShow = tabFilter(filtered, ACTIVE_TAB);
  const grid   = document.getElementById('grid');

  if (ALL_PLAYERS.length === 0) { showEmpty('waiting'); return; }
  if (toShow.length === 0)      { showEmpty('no-match'); return; }

  grid.innerHTML = toShow.map(renderCard).join('');
}

function gemColor(score) {
  if (score >= 85) return '#06d6a0';
  if (score >= 70) return '#4cc9f0';
  if (score >= 50) return '#FF8200';
  return '#ff6b6b';
}

function renderCard(p) {
  const offers     = p.offers || [];
  const name       = p.name || 'Unknown Recruit';
  const pos        = p.position || 'ATH';
  const year       = p.grad_year || '—';
  const state      = p.state || '—';
  const ht         = p.height_display || (p.height_inches ? `${Math.floor(p.height_inches/12)}'${p.height_inches%12}"` : '—');
  const wt         = p.weight ? `${p.weight} lbs` : '—';
  const gem        = p.gem_score || 50;
  const isGem      = p.is_hidden_gem;
  const cat        = p.category || 'g6';
  const eval_      = p.ai_eval || {};
  const srcName    = p.source_name || '';
  const srcUrl     = p.source_url  || '';
  const foundAt    = p.found_at    ? new Date(p.found_at).toLocaleDateString() : '';

  const offerTags  = offers.length
    ? offers.map(o => `<span class="offer-tag ${offerClass(o)}">${o}</span>`).join('')
    : `<span class="offer-tag offer-unk">No offers logged yet</span>`;

  const xSearch    = `https://x.com/search?q=${encodeURIComponent(name + ' football recruit')}`;
  const hudlSearch = `https://www.hudl.com/search#${encodeURIComponent(name)}`;
  const ucSearch   = `https://www.ultimatecheerleaders.com/search?q=${encodeURIComponent(name)}`;

  const barColor   = gemColor(gem);

  return `
  <div class="card cat-${isGem ? 'gem' : cat}">
    <div class="card-top">
      <div>
        <div class="player-name">${name}</div>
        <div class="player-meta">${pos} · ${year} · ${state}</div>
      </div>
      ${isGem ? `<div class="gem-badge">💎 Hidden Gem</div>` : ''}
    </div>

    <div class="measurables">
      <div class="meas-chip">Ht: <span>${ht}</span></div>
      <div class="meas-chip">Wt: <span>${wt}</span></div>
      <div class="meas-chip">Offers: <span>${offers.length}</span></div>
    </div>

    <div class="gem-bar-wrap">
      <div class="gem-bar-label">
        <span>Gem Score</span>
        <span style="color:${barColor};font-weight:700">${gem}/100</span>
      </div>
      <div class="gem-bar-track">
        <div class="gem-bar-fill" style="width:${gem}%;background:${barColor}"></div>
      </div>
    </div>

    <div class="offers-section">
      <div class="offers-label">Known Offers</div>
      <div class="offers-list">${offerTags}</div>
    </div>

    ${eval_.strengths ? `
    <div class="eval-section">
      <div class="eval-row">
        <div class="eval-label str">✅ Strengths</div>
        <div class="eval-text">${eval_.strengths}</div>
      </div>
      ${eval_.weaknesses ? `
      <div class="eval-row" style="margin-top:.4rem">
        <div class="eval-label wk">⚠ Areas to Evaluate</div>
        <div class="eval-text">${eval_.weaknesses}</div>
      </div>` : ''}
    </div>` : ''}

    <div class="source-cite">
      📡 Found via <a href="${srcUrl}" target="_blank" rel="noopener">${srcName || 'Recruiting Source'}</a>
      ${foundAt ? `· ${foundAt}` : ''}
    </div>

    <div class="card-links">
      <a class="clink lnk-x"    href="${xSearch}"    target="_blank" rel="noopener">𝕏 X Profile</a>
      <a class="clink lnk-hudl" href="${hudlSearch}" target="_blank" rel="noopener">▶ Hudl Film</a>
      <a class="clink lnk-uc"   href="${ucSearch}"   target="_blank" rel="noopener">📋 UC Report</a>
    </div>
  </div>`;
}

function showEmpty(type) {
  const grid = document.getElementById('grid');
  if (type === 'waiting') {
    grid.innerHTML = `
    <div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">⏳</div>
      <div class="empty-title">Waiting for First Scraper Run</div>
      <div class="empty-sub">
        The automation is set up correctly.<br>
        Go to your GitHub repo → <strong>Actions</strong> tab → click <strong>Run workflow</strong> to kick off the first data pull.<br><br>
        After that, it updates itself every 20 minutes automatically.<br>
        <span style="color:var(--vol-orange)">No data is ever invented — only real sourced offers appear here.</span>
      </div>
    </div>`;
  } else {
    grid.innerHTML = `
    <div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">No Players Match Your Filters</div>
      <div class="empty-sub">Try clearing a filter or switching tabs.</div>
    </div>`;
  }
}

// ── CSV Export ────────────────────────────────────────────────────────────────
function exportCSV() {
  const filtered = tabFilter(filterPlayers(ALL_PLAYERS), ACTIVE_TAB);
  if (!filtered.length) { alert('No players to export with current filters.'); return; }

  const headers = [
    'Name','Position','Grad Year','State',
    'Height','Weight','Gem Score','Category',
    'Offers','Source','Source URL','Found At',
    'Strengths','Weaknesses'
  ];

  const rows = filtered.map(p => [
    p.name        || '',
    p.position    || '',
    p.grad_year   || '',
    p.state       || '',
    p.height_display || '',
    p.weight      || '',
    p.gem_score   || '',
    p.is_hidden_gem ? 'Hidden Gem' : (p.category || '').toUpperCase(),
    (p.offers||[]).join(' | '),
    p.source_name || '',
    p.source_url  || '',
    p.found_at    ? new Date(p.found_at).toLocaleDateString() : '',
    p.ai_eval?.strengths  || '',
    p.ai_eval?.weaknesses || '',
  ].map(v => `"${String(v).replace(/"/g,'""')}"`));

  const csv  = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  const tab  = ACTIVE_TAB === 'all' ? 'all' : ACTIVE_TAB;
  const yr   = FILTER_YEAR || 'all-years';
  a.download = `vol-recruits-${tab}-${yr}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Auto-reload every 15 min
setInterval(() => { if (document.getElementById('dash').classList.contains('unlocked')) loadData(); }, 20*60*1000);
</script>
